<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Bible Book Body -->
  <g transform="translate(10, 8)">
    <!-- Book shadow -->
    <rect x="6" y="6" width="72" height="92" rx="6" fill="#c4b8f0" opacity="0.3"/>
    
    <!-- Page edges (bottom) -->
    <rect x="8" y="78" width="64" height="12" rx="2" fill="#d8d4ea"/>
    <line x1="12" y1="81" x2="68" y2="81" stroke="#c8c4da" stroke-width="0.5"/>
    <line x1="12" y1="84" x2="68" y2="84" stroke="#c8c4da" stroke-width="0.5"/>
    <line x1="12" y1="87" x2="68" y2="87" stroke="#c8c4da" stroke-width="0.5"/>
    
    <!-- Book spine (left edge - darker purple) -->
    <rect x="0" y="0" width="12" height="82" rx="4" fill="#6a4fd4"/>
    
    <!-- Book front cover -->
    <rect x="8" y="0" width="68" height="82" rx="5" fill="url(#bookGradient)"/>
    
    <!-- Cross on cover -->
    <g transform="translate(42, 38)">
      <!-- Vertical bar -->
      <rect x="-4" y="-20" width="8" height="40" rx="2" fill="url(#crossGradient)"/>
      <!-- Horizontal bar -->
      <rect x="-14" y="-12" width="28" height="8" rx="2" fill="url(#crossGradient)"/>
    </g>
    
    <!-- Bookmark ribbon -->
    <path d="M55 0 L55 16 L58.5 12 L62 16 L62 0" fill="#e85d75" opacity="0.7"/>
  </g>
  
  <!-- ClearBible.ai Text -->
  <text x="110" y="48" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#2d2d3a">ClearBible</tspan><tspan fill="#7c5cfc">.ai</tspan>
  </text>
  
  <!-- Subtitle Line 1 -->
  <text x="110" y="70" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#9a9ab0" letter-spacing="0.2">
    AI Verse Explanations &amp; Chapter Summaries
  </text>
  
  <!-- Subtitle Line 2 -->
  <text x="110" y="87" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#9a9ab0" letter-spacing="0.2">
    AI Bible Ask/Search Feature
  </text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bookGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b85fd"/>
      <stop offset="50%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#6a4fd4"/>
    </linearGradient>
    <linearGradient id="crossGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#e8b730"/>
    </linearGradient>
  </defs>
</svg>
